<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08080f"/>
      <stop offset="100%" stop-color="#12121e"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="gtext" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9d68f5"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="40"  x2="1200" y2="40"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="440" x2="1200" y2="440"/>
    <line x1="0" y1="520" x2="1200" y2="520"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>
  <!-- Glow -->
  <ellipse cx="600" cy="200" rx="500" ry="300" fill="rgba(124,58,237,0.12)"/>
  <!-- Border -->
  <rect x="40" y="40" width="1120" height="550" rx="20" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- Snake emoji -->
  <text x="100" y="240" font-size="100" font-family="Arial">🐍</text>
  <!-- Title -->
  <text x="240" y="220" font-size="72" font-weight="900" font-family="Arial, sans-serif" fill="white">Viper<tspan fill="url(#gtext)">API</tspan></text>
  <!-- Tagline -->
  <text x="242" y="280" font-size="30" font-family="Arial, sans-serif" fill="rgba(148,163,184,0.9)">Premium APIs for every framework, every app.</text>
  <!-- Pills -->
  <rect x="240" y="320" width="180" height="42" rx="21" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <text x="330" y="346" font-size="18" font-family="Arial" fill="#c4b5fd" text-anchor="middle">100+ Endpoints</text>
  <rect x="436" y="320" width="150" height="42" rx="21" fill="rgba(16,185,129,0.2)" stroke="rgba(16,185,129,0.4)" stroke-width="1"/>
  <text x="511" y="346" font-size="18" font-family="Arial" fill="#6ee7b7" text-anchor="middle">Any Framework</text>
  <rect x="602" y="320" width="130" height="42" rx="21" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <text x="667" y="346" font-size="18" font-family="Arial" fill="#93c5fd" text-anchor="middle">99.9% Uptime</text>
  <!-- Domain -->
  <text x="600" y="530" font-size="24" font-family="Arial, sans-serif" fill="rgba(100,116,139,0.8)" text-anchor="middle">viper-api.name.ng</text>
</svg>
