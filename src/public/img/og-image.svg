<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="100%" stop-color="#0d1526"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="gtext" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(139,92,246,0.15)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Glow orb left -->
  <radialGradient id="glow1" cx="30%" cy="40%" r="40%">
    <stop offset="0%" stop-color="rgba(139,92,246,0.18)"/>
    <stop offset="100%" stop-color="rgba(139,92,246,0)"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <!-- Glow orb right -->
  <radialGradient id="glow2" cx="75%" cy="65%" r="35%">
    <stop offset="0%" stop-color="rgba(16,185,129,0.14)"/>
    <stop offset="100%" stop-color="rgba(16,185,129,0)"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Logo icon box -->
  <rect x="80" y="80" width="80" height="80" rx="20" fill="#0e1628" stroke="rgba(139,92,246,0.4)" stroke-width="1.5"/>
  <!-- </> symbol in icon -->
  <text x="120" y="136" font-size="36" text-anchor="middle" fill="url(#grad)" font-family="monospace" font-weight="700">&lt;/&gt;</text>
  <!-- Brand name -->
  <text x="80" y="250" font-size="78" font-weight="800" font-family="system-ui,-apple-system,sans-serif" fill="white" letter-spacing="-3">Viper<tspan fill="url(#gtext)">API</tspan></text>
  <!-- Tagline -->
  <text x="80" y="316" font-size="28" font-family="system-ui,-apple-system,sans-serif" fill="#94a3b8" letter-spacing="-0.5">Premium REST APIs for every app, bot &amp; framework.</text>
  <!-- Divider line -->
  <rect x="80" y="358" width="120" height="3" rx="2" fill="url(#grad)"/>
  <!-- Stats row -->
  <text x="80" y="416" font-size="22" font-family="system-ui,-apple-system,sans-serif" fill="#64748b" letter-spacing="1">16 ENDPOINTS  ·  1 API KEY  ·  ANY LANGUAGE  ·  99.9% UPTIME</text>
  <!-- Code snippet block -->
  <rect x="80" y="448" width="620" height="108" rx="12" fill="#0e1628" stroke="#1e2d45" stroke-width="1.5"/>
  <rect x="80" y="448" width="620" height="30" rx="12" fill="#131d2e"/>
  <rect x="80" y="466" width="620" height="14" rx="0" fill="#131d2e"/>
  <circle cx="102" cy="463" r="5" fill="#ff5f57"/>
  <circle cx="120" cy="463" r="5" fill="#febc2e"/>
  <circle cx="138" cy="463" r="5" fill="#28c840"/>
  <text x="105" y="494" font-size="15" font-family="monospace" fill="#6b7280">// One key, any endpoint</text>
  <text x="105" y="516" font-size="15" font-family="monospace">
    <tspan fill="#c084fc">fetch</tspan>
    <tspan fill="#e2e8f0">(</tspan>
    <tspan fill="#86efac">'https://viper-api.name.ng/api/v1/utility/qr'</tspan>
    <tspan fill="#e2e8f0">)</tspan>
  </text>
  <text x="105" y="538" font-size="15" font-family="monospace" fill="#64748b">  Authorization: Bearer viper_xxxxxxxxxxxx</text>
  <!-- URL badge bottom right -->
  <rect x="920" y="548" width="200" height="36" rx="8" fill="#0e1628" stroke="#1e2d45" stroke-width="1.5"/>
  <text x="1020" y="572" font-size="15" font-family="monospace" fill="#8b5cf6" text-anchor="middle">viper-api.name.ng</text>
</svg>
